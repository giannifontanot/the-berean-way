<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Mi carpeta · The Berean Way</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Lato:wght@300;400&display=swap");

    :root {
      --accent: #2a6f97;
      --accent-dark: #1f5273;
      --text: #232323;
      --muted: #5b5b5b;
      --line: #e2e2e2;
      --bg: #ffffff;
      --dark: #11152b;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 17px;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      background: var(--dark);
      color: #fff;
      padding: 32px 20px 28px;
      text-align: center;
    }
    .header h1 {
      font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
      font-weight: 300;
      font-size: clamp(1.8rem, 7vw, 3rem);
      margin: 0 0 6px;
      letter-spacing: 0.01em;
    }
    .header p { margin: 0; opacity: 0.7; font-size: 0.9rem; }

    /* ---- Topbar ---- */
    .topbar {
      background: var(--dark);
      display: flex;
      align-items: center;
      padding: 0 12px;
      height: 52px;
      color: #fff;
    }
    .back-btn {
      appearance: none; border: none; background: transparent; color: #fff;
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.9rem; cursor: pointer; padding: 8px 10px; border-radius: 8px;
      text-decoration: none;
    }
    .back-btn:hover { background: rgba(255,255,255,0.1); }
    .topbar__title {
      flex: 1; text-align: center; font-size: 0.95rem; font-weight: 500;
      padding-right: 80px; /* balance visual con el botón atrás */
    }

    /* ---- Main content ---- */
    main { flex: 1; max-width: 860px; margin: 0 auto; width: 100%; padding: 28px 20px 60px; }

    /* ---- Empty state ---- */
    .empty {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty svg { width: 56px; height: 56px; margin-bottom: 16px; opacity: 0.35; }
    .empty p { margin: 0; font-size: 1rem; }

    /* ---- Toolbar ---- */
    .toolbar {
      display: flex; justify-content: flex-end; margin-bottom: 20px;
    }
    .btn-clear {
      appearance: none; border: 1px solid var(--line); background: #fff;
      color: var(--muted); font-size: 0.85rem; cursor: pointer;
      padding: 7px 14px; border-radius: 8px;
    }
    .btn-clear:hover { border-color: #c0392b; color: #c0392b; }

    /* ---- Cards grid ---- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    /* ---- Card ---- */
    .card {
      border: 1px solid var(--line); border-radius: 14px;
      padding: 18px 16px 14px;
      display: flex; flex-direction: column; gap: 10px;
      background: #fff;
      transition: box-shadow 0.15s ease;
    }
    .card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.09); }
    .card__icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--dark); color: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card__icon svg { width: 20px; height: 20px; }
    .card__title {
      font-size: 0.95rem; font-weight: 600; color: var(--text);
      line-height: 1.35; flex: 1;
    }
    .card__actions {
      display: flex; gap: 8px; margin-top: 4px;
    }
    .btn-open {
      flex: 1; appearance: none; border: none;
      background: var(--accent); color: #fff;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      padding: 8px 12px; border-radius: 8px; text-align: center;
      text-decoration: none; display: inline-flex; align-items: center; justify-content: center;
    }
    .btn-open:hover { background: var(--accent-dark); }
    .btn-remove {
      appearance: none; border: 1px solid var(--line); background: #fff;
      color: var(--muted); font-size: 0.85rem; cursor: pointer;
      padding: 8px 10px; border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .btn-remove:hover { border-color: #c0392b; color: #c0392b; }
    .btn-remove svg { width: 15px; height: 15px; }
  </style>
</head>
<body>

<header class="topbar">
  <a href="javascript:history.back()" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Volver
  </a>
  <span class="topbar__title">Mi carpeta</span>
</header>

<div class="header">
  <h1>Mi carpeta</h1>
  <p>Clases guardadas</p>
</div>

<main>
  <div id="root"></div>
</main>

<script>
(function () {
  var CARPETA_KEY = "tbw-carpeta";

  function getCarpeta() {
    try { return JSON.parse(localStorage.getItem(CARPETA_KEY) || "[]"); } catch (e) { return []; }
  }
  function saveCarpetaArr(arr) {
    localStorage.setItem(CARPETA_KEY, JSON.stringify(arr));
  }
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  function render() {
    var arr = getCarpeta();
    var root = document.getElementById("root");

    if (!arr.length) {
      root.innerHTML = '<div class="empty">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
        '<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>' +
        '<p>Aún no has guardado ninguna clase.<br>Usa el marcador <svg style="vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg> en la barra superior de cada clase.</p>' +
        '</div>';
      return;
    }

    var html = '<div class="toolbar"><button class="btn-clear" id="clearAll">Limpiar todo</button></div>';
    html += '<div class="grid">';
    arr.forEach(function (item, i) {
      html += '<div class="card" data-idx="' + i + '">' +
        '<div class="card__icon">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div>' +
        '<div class="card__title">' + esc(item.title || item.url) + '</div>' +
        '<div class="card__actions">' +
        '<a href="' + esc(item.url) + '" class="btn-open">Abrir</a>' +
        '<button class="btn-remove" data-idx="' + i + '" aria-label="Quitar">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>' +
        '<path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>' +
        '</button></div></div>';
    });
    html += '</div>';
    root.innerHTML = html;

    document.getElementById("clearAll").addEventListener("click", function () {
      if (confirm("¿Quitar todas las clases guardadas?")) {
        saveCarpetaArr([]);
        render();
      }
    });

    document.querySelectorAll(".btn-remove").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var idx = parseInt(btn.getAttribute("data-idx"), 10);
        var arr2 = getCarpeta();
        arr2.splice(idx, 1);
        saveCarpetaArr(arr2);
        render();
      });
    });
  }

  document.addEventListener("DOMContentLoaded", render);
  if (document.readyState !== "loading") render();
})();
</script>
</body>
</html>
