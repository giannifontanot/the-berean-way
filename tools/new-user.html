<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuevo usuario · The Berean Way</title>
<style>
  :root {
    --bg:#f6f3ee;
    --card:#fffdfa;
    --ink:#34302b;
    --muted:#8a8076;
    --line:#e6ded3;
    --accent:#9c6b46;
    --accent-dark:#7c5235;
    --accent-soft:#efe5da;
    --green:#5a7a4f;
    --red:#b00020;
  }
  * { box-sizing:border-box; }
  body { font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;
         font-size:18px; line-height:1.55;
         max-width:620px; margin:0 auto; padding:30px 20px 90px;
         color:var(--ink); background:var(--bg); }
  h1 { font-weight:600; letter-spacing:.2px; margin:0 0 4px; }
  h2 { font-size:.82rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
       margin:30px 0 8px; padding-bottom:7px; border-bottom:1px solid var(--line); color:var(--accent-dark); }
  p.muted { color:var(--muted); font-size:.95rem; margin:4px 0 20px; }
  label { display:block; font-weight:600; font-size:.92rem; margin:14px 0 5px; color:#5c544b; }
  input[type=text] {
    width:100%; font-family:inherit; font-size:.95rem; padding:10px 13px;
    border:1px solid var(--line); border-radius:10px; background:var(--card); color:var(--ink); }
  input[type=text]:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .btns { margin-top:24px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  button { font-family:inherit; font-size:.92rem; padding:10px 17px; border-radius:10px;
           border:1px solid transparent; cursor:pointer; transition:background .15s, border-color .15s; }
  .primary { background:var(--accent); color:#fff; }
  .primary:hover { background:var(--accent-dark); }
  .ghost { background:var(--card); color:var(--accent-dark); border-color:var(--line); }
  .ghost:hover { background:var(--accent-soft); border-color:var(--accent); }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .out { margin-top:24px; padding:16px 20px; border:1px solid var(--line); border-radius:12px;
         background:var(--card); display:none; }
  .out.show { display:block; }
  .step { display:flex; align-items:flex-start; gap:12px; margin:14px 0; }
  .step-num { flex:0 0 auto; width:26px; height:26px; border-radius:50%;
              background:var(--accent); color:#fff; font-size:.82rem; font-weight:700;
              display:flex; align-items:center; justify-content:center; margin-top:2px; }
  code { background:var(--accent-soft); color:var(--accent-dark); padding:2px 6px; border-radius:5px;
         font-size:.85rem; font-family:ui-monospace,Menlo,Consolas,monospace; }
  .err { color:var(--red); font-weight:600; margin-top:10px; min-height:1.4em; }
  #loadingMsg { color:var(--muted); font-size:.9rem; margin-top:8px; }
  .preview { color:var(--muted); font-size:.88rem; margin:4px 0 0; }
</style>
</head>
<body>
  <h1>Crear usuario nuevo</h1>
  <p class="muted">Agrega el alumno al roster y crea su carpeta de estudios.</p>
  <p id="loadingMsg">Cargando roster…</p>

  <div id="ui" style="display:none">
    <h2>Datos del alumno</h2>

    <label for="nameInput">Nombre *</label>
    <input type="text" id="nameInput" placeholder="Paquito" autocomplete="off">
    <p class="preview" id="titlePreview"></p>

    <div class="btns">
      <button class="primary" id="createBtn">Crear usuario</button>
    </div>
    <p id="msg" class="err"></p>
    <div class="out" id="out"></div>
  </div>

<script>
"use strict";

/* ================================================================
   Estado
   ================================================================ */
let ROSTER = {};

/* ================================================================
   Init: cargar roster.js
   ================================================================ */
window.addEventListener("load", async () => {
  try {
    await loadScript("../roster.js");
    ROSTER = window.ROSTER ? JSON.parse(JSON.stringify(window.ROSTER)) : {};
    document.getElementById("loadingMsg").style.display = "none";
    document.getElementById("ui").style.display = "block";
    document.getElementById("nameInput").focus();
  } catch (e) {
    document.getElementById("loadingMsg").textContent =
      "⚠ Error al cargar roster.js. Abre esta herramienta desde un servidor local (localhost:8000/tools/new-user.html).";
  }
});

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error("No se pudo cargar " + src));
    document.head.appendChild(s);
  });
}

/* Vista previa del título mientras escribe */
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("nameInput").addEventListener("input", e => {
    const name = e.target.value.trim();
    document.getElementById("titlePreview").textContent =
      name ? "Título: Los estudios de " + name : "";
  });
});

/* ================================================================
   Crear usuario
   ================================================================ */
document.getElementById("createBtn").addEventListener("click", async () => {
  msg("");
  const name = document.getElementById("nameInput").value.trim();
  if (!name) { msg("Escribe el nombre del alumno."); return; }

  const code = randomCode();
  const title = "Los estudios de " + name;

  // Agregar al roster en memoria
  ROSTER[code] = { student: name, title, series: {} };

  // Generar los dos archivos
  const indexContent = indexHtml();
  const rosterContent = genRoster(ROSTER);

  // Mostrar resultado con instrucciones de descarga
  showResult({ name, code, title }, indexContent, rosterContent);
});

/* ================================================================
   Generar index.html del usuario
   ================================================================ */
function indexHtml() {
  return `<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mis estudios · The Berean Way<\/title>
  <link rel="stylesheet" href="../../assets/styles.css">
<\/head>
<body>
  <script src="../../roster.js"><\/script>
  <script src="../../assets/app.js"><\/script>
<\/body>
<\/html>
`;
}

/* ================================================================
   Generar roster.js actualizado
   ================================================================ */
function genRoster(roster) {
  const lines = [
    "/* ============================================================",
    "   The Berean Way — ROSTER",
    "   Controla qué series y lecciones ve cada usuario.",
    "   Edita con tools/admin.html, luego haz commit + push.",
    "   ============================================================ */",
    "window.ROSTER = {"
  ];
  const entries = Object.entries(roster);
  entries.forEach(([code, u], i) => {
    const comma = i < entries.length - 1 ? "," : "";
    const seriesEntries = Object.entries(u.series || {});
    const seriesLines = seriesEntries.map(([k, arr], j) => {
      const sc = j < seriesEntries.length - 1 ? "," : "";
      return `      ${k}: [${arr.map(v => v === true ? "true" : "false").join(", ")}]${sc}`;
    });
    lines.push(`  "${code}": {`);
    lines.push(`    student: ${JSON.stringify(u.student || "")},`);
    lines.push(`    title: ${JSON.stringify(u.title || "")},`);
    if (u.dedication) lines.push(`    dedication: ${JSON.stringify(u.dedication)},`);
    lines.push(`    series: {`);
    seriesLines.forEach(l => lines.push(l));
    lines.push(`    }`);
    lines.push(`  }${comma}`);
  });
  lines.push("};");
  return lines.join("\n") + "\n";
}

/* ================================================================
   Mostrar resultado + botones de descarga
   ================================================================ */
function showResult(opts, indexContent, rosterContent) {
  const out = document.getElementById("out");
  out.className = "out show";
  out.innerHTML = `
    <p><strong>Usuario creado:</strong> ${esc(opts.name)}</p>
    <p>Código: <code>${esc(opts.code)}</code></p>
    <p style="margin-bottom:20px;color:var(--muted);font-size:.9rem">
      Descarga los dos archivos y colócalos en el repo, luego abre <strong>admin.html</strong>
      para asignarle series y lecciones.
    </p>

    <div class="step">
      <div class="step-num">1</div>
      <div>
        <strong>Descarga <code>index.html</code></strong> y colócalo en
        <code>sites/${esc(opts.code)}/index.html</code>
        (crea la carpeta si no existe).<br>
        <button class="ghost" style="margin-top:8px" id="dlIndex">⬇ Descargar index.html</button>
      </div>
    </div>

    <div class="step">
      <div class="step-num">2</div>
      <div>
        <strong>Descarga <code>roster.js</code></strong> actualizado y reemplaza el archivo
        en la raíz del repo.<br>
        <button class="ghost" style="margin-top:8px" id="dlRoster">⬇ Descargar roster.js</button>
      </div>
    </div>

    <div class="step">
      <div class="step-num">3</div>
      <div>
        <strong>Haz commit y push</strong>:<br>
        <code>git add sites/${esc(opts.code)}/index.html roster.js</code><br>
        <code>git commit -m "Add user ${esc(opts.name)}"</code><br>
        <code>git push</code>
      </div>
    </div>

    <div class="step">
      <div class="step-num">4</div>
      <div>
        Abre <strong>admin.html</strong> para asignarle series, lecciones y dedicatoria.
      </div>
    </div>`;

  out.querySelector("#dlIndex").onclick = () => download("index.html", indexContent, "text/html");
  out.querySelector("#dlRoster").onclick = () => download("roster.js", rosterContent, "text/javascript");
}

/* ================================================================
   Util
   ================================================================ */
function download(filename, text, mime) {
  const blob = new Blob([text], { type: mime });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}

function randomCode() {
  const a = new Uint8Array(4);
  (self.crypto || window.crypto).getRandomValues(a);
  return "s-" + [...a].map(b => b.toString(16).padStart(2, "0")).join("");
}

function esc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function msg(t) { document.getElementById("msg").textContent = t || ""; }
</script>
</body>
</html>
