<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Carpeta · The Berean Way</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 2px solid #e63946;
    }

    header .folder-icon { font-size: 2rem; }

    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
    }

    header p {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 2px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
      gap: 12px;
      color: #666;
    }

    .empty-state .icon { font-size: 3.5rem; }
    .empty-state h2 { font-size: 1.1rem; color: #888; font-weight: 500; }
    .empty-state p { font-size: 0.85rem; line-height: 1.5; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
      padding: 24px;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 12px;
      padding: 18px 12px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s, border-color 0.15s, background 0.15s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #e63946;
      background: #22223a;
    }

    .card:active { transform: scale(0.97); }

    .card .favicon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: #2a2a3e;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card .favicon img {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .card .favicon .fallback { font-size: 1.5rem; }

    .card .label {
      font-size: 0.78rem;
      font-weight: 600;
      text-align: center;
      color: #ddd;
      line-height: 1.3;
      word-break: break-word;
    }

    .card .domain {
      font-size: 0.68rem;
      color: #666;
      text-align: center;
    }

    .delete-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      background: none;
      border: none;
      color: #555;
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }

    .card:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #e63946; }

    .count-badge {
      background: #e63946;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      border-radius: 20px;
      padding: 2px 8px;
      margin-left: auto;
    }

    footer {
      padding: 24px;
      text-align: center;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>

<header>
  <div class="folder-icon">📁</div>
  <div>
    <h1>Mi Carpeta</h1>
    <p id="subtitle">Cargando...</p>
  </div>
  <span class="count-badge" id="count">0</span>
</header>

<div id="content"></div>

<footer>The Berean Way · Los links se guardan en este dispositivo</footer>

<script>
  const STORAGE_KEY = 'tbw-carpeta';

  function getLinks() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch { return []; }
  }

  function saveLinks(links) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
  }

  function getDomain(url) {
    try { return new URL(url).hostname.replace('www.', ''); }
    catch { return url; }
  }

  function getFaviconUrl(url) {
    try {
      const domain = new URL(url).hostname;
      return `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;
    } catch { return null; }
  }

  function render() {
    const links = getLinks();
    const content = document.getElementById('content');
    const count = document.getElementById('count');
    const subtitle = document.getElementById('subtitle');

    count.textContent = links.length;
    subtitle.textContent = links.length === 0
      ? 'Vacía — guarda una clase para empezar'
      : `${links.length} clase${links.length !== 1 ? 's' : ''} guardada${links.length !== 1 ? 's' : ''}`;

    if (links.length === 0) {
      content.innerHTML = `
        <div class="empty-state">
          <div class="icon">📭</div>
          <h2>Tu carpeta está vacía</h2>
          <p>Cuando abras una clase y piques<br><strong>"Guardar en carpeta"</strong>,<br>aparecerá aquí.</p>
        </div>`;
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'grid';

    links.forEach((link, i) => {
      const domain = getDomain(link.url);
      const favicon = getFaviconUrl(link.url);

      let safeUrl = '#';
      try {
        const parsed = new URL(link.url);
        if (parsed.protocol === 'https:' || parsed.protocol === 'http:') safeUrl = link.url;
      } catch {}

      const card = document.createElement('a');
      card.className = 'card';
      card.href = safeUrl;
      card.target = '_blank';
      card.rel = 'noopener';

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.title = 'Quitar';
      delBtn.textContent = '✕';
      delBtn.addEventListener('click', (e) => removeLink(e, i));

      const faviconDiv = document.createElement('div');
      faviconDiv.className = 'favicon';
      if (favicon) {
        const img = document.createElement('img');
        img.src = favicon;
        img.alt = '';
        const fallback = document.createElement('span');
        fallback.className = 'fallback';
        fallback.textContent = '🔗';
        fallback.style.display = 'none';
        img.addEventListener('error', () => { img.style.display = 'none'; fallback.style.display = 'block'; });
        faviconDiv.appendChild(img);
        faviconDiv.appendChild(fallback);
      } else {
        const fallback = document.createElement('span');
        fallback.className = 'fallback';
        fallback.textContent = '🔗';
        faviconDiv.appendChild(fallback);
      }

      const labelDiv = document.createElement('div');
      labelDiv.className = 'label';
      labelDiv.textContent = link.title || domain;

      const domainDiv = document.createElement('div');
      domainDiv.className = 'domain';
      domainDiv.textContent = domain;

      card.appendChild(delBtn);
      card.appendChild(faviconDiv);
      card.appendChild(labelDiv);
      card.appendChild(domainDiv);
      grid.appendChild(card);
    });

    content.innerHTML = '';
    content.appendChild(grid);
  }

  function removeLink(e, index) {
    e.preventDefault();
    e.stopPropagation();
    const links = getLinks();
    links.splice(index, 1);
    saveLinks(links);
    render();
  }

  render();
</script>
</body>
</html>
