<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sticky Shapes — Árbol de Ideas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Lienzo: contiene el árbol de fondo y las hojas del usuario -->
  <main id="canvas" aria-label="Árbol de ideas">

    <!-- Bonsái japonés de dos ramas, dibujado en SVG con neón café.
         Silueta rellena: tronco en S (estilo moyogi) y dos ramas que se
         afinan hacia la punta. preserveAspectRatio mantiene la proporción
         (el árbol no se deforma al cambiar el tamaño de pantalla). -->
    <svg id="tree" viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" aria-hidden="true">
      <!-- Bonsái como trazos sólidos café que se afinan por segmento
           (tronco en S estilo moyogi, dos ramas, puntas finas).
           El resplandor neón se aplica al grupo completo, de modo que el
           halo sigue el contorno unificado del árbol, sin costuras. -->
      <g class="tree-solid">
        <!-- Tronco en S (moyogi); termina en la horqueta donde nacen las ramas -->
        <path stroke-width="8"   d="M 49.5 91 C 49 85.5, 52.5 80.5, 51.5 73" />
        <path stroke-width="6.5" d="M 51.5 74 C 50.5 67, 47.5 63, 48.5 56" />
        <path stroke-width="5"   d="M 48.5 58 C 49 54, 50 52, 50.5 50.5" />
        <!-- Rama izquierda: se extiende casi horizontal, con leve caída -->
        <path stroke-width="3.8" d="M 50 51.5 C 43 49, 36 49.5, 29 47" />
        <path stroke-width="2"   d="M 30 47.5 C 23 45, 17 43.5, 11 40" />
        <path stroke-width="1"   d="M 12 40.3 C 8.5 38.5, 6.5 36.5, 5 34" />
        <!-- Ramita secundaria izquierda (hacia arriba) -->
        <path stroke-width="1"   d="M 26 46.5 C 25 43.5, 24.5 41, 25 38" />
        <!-- Rama derecha: se extiende horizontal con suave ascenso -->
        <path stroke-width="3.8" d="M 50.5 50.5 C 57 47.5, 63 46, 70 43.5" />
        <path stroke-width="2"   d="M 69 44 C 76 41, 82 38.5, 88 34.5" />
        <path stroke-width="1"   d="M 87 35 C 90.5 32.5, 92.5 30.5, 94 28" />
        <!-- Ramita secundaria derecha (hacia arriba) -->
        <path stroke-width="1"   d="M 74 40 C 74.5 37, 75.5 34.5, 77 32" />
        <!-- Base con raíces -->
        <path stroke-width="3"   d="M 43 90.8 C 47 89, 52 89, 56 90.8" />
      </g>
    </svg>

    <!-- Piso: línea de neón que cruza toda la pantalla -->
    <div id="floor" aria-hidden="true"></div>

    <!-- Etiquetas de las zonas (texto arcade discreto) -->
    <div id="zone-labels" aria-hidden="true"></div>

    <!-- Las hojas se insertan aquí desde script.js -->

  </main>

  <!-- Botón flotante para crear hojas nuevas -->
  <button id="add-btn" type="button" aria-label="Crear nueva hoja">+</button>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
