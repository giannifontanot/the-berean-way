<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sticky Shapes — Árbol de Ideas</title>
  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>

  <!-- Lienzo: contiene el árbol de fondo y las hojas del usuario -->
  <main id="canvas" aria-label="Árbol de ideas">

    <!-- Árbol estilo arcade pixel-art: tronco café con vetas de corteza,
         dos copas de nube delineadas en verde neón y pasto en la base.
         viewBox VERTICAL (100x170) pensado para pantallas de teléfono 9:16:
         el árbol llena la pantalla a lo alto; en escritorio queda centrado. -->
    <svg id="tree" viewBox="0 0 100 170" preserveAspectRatio="xMidYMax meet" aria-hidden="true">

      <!-- Copas de nube: contornos ondulados generados alrededor de una
           elipse; el interior queda oscuro, solo brilla el borde. -->
      <g class="tree-canopy">
        <path d="M 47.6 57.0 A 5.0 5.0 0 0 1 45.2 64.6 A 5.3 5.3 0 0 1 42.0 72.5 A 5.7 5.7 0 0 1 33.2 75.1 A 5.5 5.5 0 0 1 25.0 78.5 A 5.6 5.6 0 0 1 16.3 76.2 A 5.2 5.2 0 0 1 9.9 70.8 A 5.3 5.3 0 0 1 3.4 65.2 A 5.1 5.1 0 0 1 3.7 57.0 A 5.0 5.0 0 0 1 3.7 48.9 A 5.2 5.2 0 0 1 9.8 43.1 A 5.1 5.1 0 0 1 16.8 38.8 A 5.4 5.4 0 0 1 25.0 36.0 A 5.9 5.9 0 0 1 34.5 36.1 A 5.6 5.6 0 0 1 40.3 43.0 A 5.0 5.0 0 0 1 45.5 49.3 A 5.0 5.0 0 0 1 47.6 57.0 Z" />
        <path d="M 99.9 48.0 A 5.8 5.8 0 0 1 99.4 57.3 A 6.0 6.0 0 0 1 92.5 64.0 A 5.8 5.8 0 0 1 84.1 68.2 A 6.2 6.2 0 0 1 75.0 72.3 A 6.3 6.3 0 0 1 66.5 66.9 A 6.2 6.2 0 0 1 56.6 64.8 A 5.7 5.7 0 0 1 53.4 56.2 A 5.1 5.1 0 0 1 52.3 48.0 A 5.0 5.0 0 0 1 54.1 40.1 A 5.2 5.2 0 0 1 58.4 32.8 A 5.9 5.9 0 0 1 65.1 26.1 A 6.1 6.1 0 0 1 75.0 27.0 A 5.9 5.9 0 0 1 84.5 27.1 A 5.9 5.9 0 0 1 92.7 31.8 A 5.6 5.6 0 0 1 97.0 39.7 A 5.5 5.5 0 0 1 99.9 48.0 Z" />
      </g>

      <!-- Tronco: silueta rellena con base ancha (raíces) y dos brazos
           gruesos que suben hacia el interior de cada copa. -->
      <g class="tree-bark">
        <path class="trunk" d="M 34 156.4 C 40 153.0 43.5 141.1 44.5 124.1 C 45 112.2 45.5 102.0 46.5 91.8 C 43 85.0 37 78.2 31.5 69.7 C 29.5 67.1 30.5 62.0 33 64.6 C 38 70.5 43 76.5 46.5 79.9 C 48 80.8 49 79.0 49.5 75.6 C 50 78.2 50.5 79.6 51.5 78.5 C 52.5 77.3 53 74.8 53.5 72.2 C 58 67.1 64 62.0 69.5 56.9 C 72 54.4 73 58.6 71 62.0 C 65 68.8 59 74.8 55 80.8 C 53.5 83.3 53 86.7 53.5 91.8 C 54.5 102.0 55 112.2 55.5 124.1 C 56.5 141.1 60 153.0 66 156.4 C 55 152.2 45 152.2 34 156.4 Z" />
        <!-- Vetas de la corteza -->
        <path class="bark-line" d="M 47 149.6 C 48 132.6 47.5 115.6 48.5 95.2" />
        <path class="bark-line" d="M 52.5 149.6 C 52 132.6 52.3 115.6 51.8 95.2" />
        <path class="bark-line" d="M 49.8 147.9 C 50.1 129.2 49.9 112.2 50.1 88.4" />
        <path class="bark-line" d="M 45.5 146.2 C 46.2 134.3 46 122.4 46.8 107.1" />
        <path class="bark-line" d="M 54.2 146.2 C 53.8 134.3 54.1 122.4 53.6 107.1" />
      </g>

      <!-- Pasto: mechones de neón verde a lo largo del piso -->
      <g class="tree-grass">
        <path d="M 10 155.5 C 9.5 153, 9 151, 8 149.5 M 11 155.5 C 11 152.5, 11.2 150.5, 11.5 148.5 M 12.2 155.5 C 12.8 153, 13.4 151.3, 14.3 150" />
        <path d="M 24 155.5 C 23.5 153, 23 151, 22 149.5 M 25 155.5 C 25 152.5, 25.2 150.5, 25.5 148.5 M 26.2 155.5 C 26.8 153, 27.4 151.3, 28.3 150" />
        <path d="M 71 155.5 C 70.5 153, 70 151, 69 149.5 M 72 155.5 C 72 152.5, 72.2 150.5, 72.5 148.5 M 73.2 155.5 C 73.8 153, 74.4 151.3, 75.3 150" />
        <path d="M 85 155.5 C 84.5 153, 84 151, 83 149.5 M 86 155.5 C 86 152.5, 86.2 150.5, 86.5 148.5 M 87.2 155.5 C 87.8 153, 88.4 151.3, 89.3 150" />
      </g>
    </svg>

    <!-- Piso: línea de pasto neón que cruza toda la pantalla -->
    <div id="floor" aria-hidden="true"></div>

    <!-- Cofre del tesoro: arrastra una hoja aquí para borrarla -->
    <div id="treasure" aria-label="Cofre: suelta una hoja aquí para borrarla">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <!-- Tapa abovedada -->
        <path class="chest-lid" d="M 4 11 A 8 6 0 0 1 20 11 Z" />
        <!-- Cuerpo del cofre -->
        <path class="chest-body" d="M 4 11 H 20 V 19 A 1 1 0 0 1 19 20 H 5 A 1 1 0 0 1 4 19 Z" />
        <!-- Cerradura -->
        <rect class="chest-lock" x="10.6" y="10" width="2.8" height="4" rx="0.6" />
      </svg>
    </div>

    <!-- Etiquetas de las zonas (texto arcade discreto) -->
    <div id="zone-labels" aria-hidden="true"></div>

    <!-- Las hojas se insertan aquí desde script.js -->

  </main>

  <!-- Botón flotante para crear hojas nuevas -->
  <button id="add-btn" type="button" aria-label="Crear nueva hoja">+</button>

  <script src="config.js?v=4"></script>
  <script src="script.js?v=4"></script>
</body>
</html>
