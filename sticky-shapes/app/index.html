<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sticky Shapes — Árbol de Ideas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Lienzo: contiene el árbol de fondo y las hojas del usuario -->
  <main id="canvas" aria-label="Árbol de ideas">

    <!-- Bonsái japonés de dos ramas, dibujado en SVG con neón café.
         Silueta rellena: tronco en S (estilo moyogi) y dos ramas que se
         afinan hacia la punta. preserveAspectRatio mantiene la proporción
         (el árbol no se deforma al cambiar el tamaño de pantalla). -->
    <svg id="tree" viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" aria-hidden="true">
      <!-- Bonsái como trazos sólidos café que se afinan por segmento
           (tronco en S estilo moyogi, dos ramas, puntas finas).
           El resplandor neón se aplica al grupo completo, de modo que el
           halo sigue el contorno unificado del árbol, sin costuras. -->
      <g class="tree-solid">
        <!-- Tronco en S (moyogi); termina en la horqueta donde nacen las ramas -->
        <path stroke-width="9"   d="M 49.5 91 C 48.5 85, 53 80.5, 52 73" />
        <path stroke-width="7.5" d="M 52 74 C 51 67, 47.5 63.5, 48.5 57" />
        <path stroke-width="6"   d="M 48.5 59 C 49 54.5, 50 52.5, 50.5 50" />
        <!-- Rama izquierda: larga, casi horizontal, con leve caída -->
        <path stroke-width="4.5" d="M 50 51.5 C 43 48.5, 36 49, 28 45.5" />
        <path stroke-width="2.8" d="M 29 46 C 21 42.5, 15 41, 9 37" />
        <path stroke-width="1.4" d="M 10 37.5 C 7 35.5, 5 33.5, 3.5 30.5" />
        <!-- Ramitas secundarias izquierdas (hacia arriba, para colgar hojas) -->
        <path stroke-width="1.6" d="M 36 47.5 C 34.5 43.5, 34 40, 35 36" />
        <path stroke-width="1.2" d="M 22 42.8 C 21 39, 21 36, 22.5 32.5" />
        <path stroke-width="1"   d="M 15 40.8 C 13.5 38, 13 35.5, 13.5 32.5" />
        <!-- Rama derecha: larga, horizontal con suave ascenso -->
        <path stroke-width="4.5" d="M 50.5 50.5 C 57.5 47.5, 64 46, 72 42.5" />
        <path stroke-width="2.8" d="M 71 43 C 79 39.5, 85 37, 91 32.5" />
        <path stroke-width="1.4" d="M 90 33 C 93 30.8, 95 28.5, 96.5 25.5" />
        <!-- Ramitas secundarias derechas (hacia arriba, para colgar hojas) -->
        <path stroke-width="1.6" d="M 64 45 C 65 41, 66 38, 68 34.5" />
        <path stroke-width="1.2" d="M 78 39.8 C 78.5 36, 79.5 33, 81.5 29.5" />
        <path stroke-width="1"   d="M 86 36 C 86.5 33, 87.5 30.5, 89 27.5" />
        <!-- Base con raíces -->
        <path stroke-width="3.2" d="M 42.5 90.8 C 46.5 89, 52.5 89, 56.5 90.8" />
      </g>
    </svg>

    <!-- Piso: línea de neón que cruza toda la pantalla -->
    <div id="floor" aria-hidden="true"></div>

    <!-- Basurero: arrastra una hoja aquí para borrarla -->
    <div id="trash" aria-label="Basurero: suelta una hoja aquí para borrarla">🗑</div>

    <!-- Etiquetas de las zonas (texto arcade discreto) -->
    <div id="zone-labels" aria-hidden="true"></div>

    <!-- Las hojas se insertan aquí desde script.js -->

  </main>

  <!-- Botón flotante para crear hojas nuevas -->
  <button id="add-btn" type="button" aria-label="Crear nueva hoja">+</button>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
