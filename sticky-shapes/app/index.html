<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sticky Shapes — Árbol de Oración</title>
  <link rel="stylesheet" href="style.css?v=33">
</head>
<body>

  <!-- Lienzo: contiene el árbol de fondo y las hojas del usuario -->
  <main id="canvas" aria-label="Árbol de oración">

    <!-- Árbol estilo arcade pixel-art: tronco café con vetas de corteza,
         dos copas de nube delineadas en verde neón y pasto en la base.
         viewBox VERTICAL (100x170) pensado para pantallas de teléfono 9:16:
         el árbol llena la pantalla a lo alto; en escritorio queda centrado. -->
    <svg id="tree" viewBox="0 0 100 170" preserveAspectRatio="xMidYMax meet" aria-hidden="true">

      <!-- EASTER EGG: cuatro árboles. Toca la base del tronco para
           cambiar entre Acacia, Roble, Bonsái y Eucalipto. Cada variante
           trae sus propios colores vía data-tree en el <svg> (CSS). -->

      <!-- ROBLE (el árbol original) -->
      <g class="tree-variant" data-variant="oak">
        <!-- Copas de nube: contornos ondulados generados alrededor de una
             elipse; el interior queda oscuro, solo brilla el borde. -->
        <g class="tree-canopy">
          <!-- Copa central (arriba) -->
          <path d="M 73.1 28.0 A 4.5 4.5 0 0 1 71.8 35.1 A 4.9 4.9 0 0 1 67.8 41.9 A 5.8 5.8 0 0 1 58.9 44.8 A 5.6 5.6 0 0 1 50.0 46.3 A 5.7 5.7 0 0 1 40.9 45.2 A 5.1 5.1 0 0 1 34.5 40.2 A 4.9 4.9 0 0 1 28.4 35.0 A 4.6 4.6 0 0 1 26.1 28.0 A 4.6 4.6 0 0 1 27.2 20.6 A 5.4 5.4 0 0 1 34.7 16.1 A 4.9 4.9 0 0 1 41.4 11.7 A 5.3 5.3 0 0 1 50.0 11.1 A 5.9 5.9 0 0 1 59.5 10.1 A 5.5 5.5 0 0 1 67.1 14.6 A 4.6 4.6 0 0 1 69.7 21.6 A 4.5 4.5 0 0 1 73.1 28.0 Z" />
          <!-- Copa izquierda -->
          <path d="M 47.2 60.0 A 4.6 4.6 0 0 1 45.4 67.2 A 4.9 4.9 0 0 1 39.5 72.6 A 5.0 5.0 0 0 1 32.3 76.3 A 5.2 5.2 0 0 1 24.0 76.1 A 4.7 4.7 0 0 1 16.6 74.5 A 5.0 5.0 0 0 1 8.8 72.3 A 4.3 4.3 0 0 1 5.9 66.1 A 4.0 4.0 0 0 1 3.9 60.0 A 4.0 4.0 0 0 1 5.3 53.7 A 4.3 4.3 0 0 1 10.3 48.9 A 4.6 4.6 0 0 1 15.9 44.2 A 5.1 5.1 0 0 1 24.0 42.9 A 5.4 5.4 0 0 1 32.7 43.0 A 5.0 5.0 0 0 1 39.1 47.8 A 4.6 4.6 0 0 1 44.2 53.2 A 4.6 4.6 0 0 1 47.2 60.0 Z" />
          <!-- Copa derecha -->
          <path d="M 97.3 60.0 A 4.3 4.3 0 0 1 96.3 66.8 A 4.7 4.7 0 0 1 91.0 72.1 A 4.8 4.8 0 0 1 83.8 75.3 A 5.3 5.3 0 0 1 76.0 78.9 A 5.6 5.6 0 0 1 67.1 77.4 A 5.2 5.2 0 0 1 60.0 73.0 A 4.7 4.7 0 0 1 55.5 66.9 A 4.3 4.3 0 0 1 55.4 60.0 A 4.1 4.1 0 0 1 57.3 53.7 A 4.3 4.3 0 0 1 61.5 48.3 A 4.7 4.7 0 0 1 68.5 45.3 A 5.1 5.1 0 0 1 76.0 41.9 A 5.2 5.2 0 0 1 84.0 44.4 A 5.3 5.3 0 0 1 92.0 47.0 A 4.5 4.5 0 0 1 95.3 53.5 A 4.2 4.2 0 0 1 97.3 60.0 Z" />
        </g>

        <!-- Tronco: silueta rellena con base ancha (raíces) y dos brazos
             gruesos que suben hacia el interior de cada copa. -->
        <g class="tree-bark">
          <path class="trunk" d="M 34 156.4 C 40 153.0 43.5 141.1 44.5 124.1 C 45 112.2 45.5 102.0 46.5 91.8 C 43 85.0 37 78.2 31.5 69.7 C 29.5 67.1 30.5 62.0 33 64.6 C 38 70.5 43 76.5 46.5 79.9 C 48 80.8 49 79.0 49.5 75.6 C 49 68 48.3 58 48 48 C 47.8 44.5 51.6 43.5 51.8 47 C 52 56 52.5 65 53 73 C 53.1 74 53.3 73.2 53.5 72.2 C 58 67.1 64 62.0 69.5 56.9 C 72 54.4 73 58.6 71 62.0 C 65 68.8 59 74.8 55 80.8 C 53.5 83.3 53 86.7 53.5 91.8 C 54.5 102.0 55 112.2 55.5 124.1 C 56.5 141.1 60 153.0 66 156.4 C 55 152.2 45 152.2 34 156.4 Z" />
          <!-- Vetas de la corteza -->
          <path class="bark-line" d="M 47 149.6 C 48 132.6 47.5 115.6 48.5 95.2" />
          <path class="bark-line" d="M 52.5 149.6 C 52 132.6 52.3 115.6 51.8 95.2" />
          <path class="bark-line" d="M 49.8 147.9 C 50.1 129.2 49.9 112.2 50.1 88.4" />
          <path class="bark-line" d="M 45.5 146.2 C 46.2 134.3 46 122.4 46.8 107.1" />
          <path class="bark-line" d="M 54.2 146.2 C 53.8 134.3 54.1 122.4 53.6 107.1" />
        </g>
      </g>

      <!-- ACACIA: copa plana de sombrilla, tronco delgado con ramas en abanico -->
      <g class="tree-variant" data-variant="acacia">
        <g class="tree-canopy">
          <path d="M 92.5 30.0 A 2.6 2.6 0 0 1 92.8 34.1 A 5.2 5.2 0 0 1 85.3 37.6 A 5.7 5.7 0 0 1 76.8 40.9 A 7.9 7.9 0 0 1 64.1 42.8 A 8.8 8.8 0 0 1 50.0 42.1 A 7.8 7.8 0 0 1 37.5 41.4 A 9.5 9.5 0 0 1 22.1 41.3 A 4.8 4.8 0 0 1 15.5 37.4 A 4.2 4.2 0 0 1 9.6 33.9 A 5.8 5.8 0 0 1 1.2 30.0 A 4.8 4.8 0 0 1 7.8 25.9 A 3.5 3.5 0 0 1 11.6 21.8 A 7.8 7.8 0 0 1 23.9 19.4 A 7.6 7.6 0 0 1 35.8 17.1 A 8.8 8.8 0 0 1 50.0 17.7 A 8.8 8.8 0 0 1 64.1 17.1 A 8.7 8.7 0 0 1 78.1 18.6 A 5.6 5.6 0 0 1 86.3 22.2 A 5.5 5.5 0 0 1 94.4 25.7 A 2.9 2.9 0 0 1 92.5 30.0 Z" />
        </g>
        <g class="tree-bark">
          <path class="trunk-line" stroke-width="3"   d="M 50 156 C 48 132 52 112 50 96" />
          <path class="trunk-line" stroke-width="1.8" d="M 50 98 C 44 76 33 58 20 42" />
          <path class="trunk-line" stroke-width="1.8" d="M 50 96 C 50 74 47 56 42 42" />
          <path class="trunk-line" stroke-width="1.8" d="M 50 96 C 56 74 62 56 70 42" />
          <path class="trunk-line" stroke-width="1.6" d="M 50 100 C 60 80 74 60 85 44" />
          <path class="trunk-line" stroke-width="1.2" d="M 45 68 C 38 58 32 52 26 46" />
          <path class="trunk-line" stroke-width="1.2" d="M 55 70 C 62 60 68 54 76 46" />
        </g>
      </g>

      <!-- BONSÁI: tronco en S con tres pisos de follaje -->
      <g class="tree-variant" data-variant="bonsai">
        <g class="tree-canopy">
          <path d="M 40.6 72.0 A 2.4 2.4 0 0 1 38.7 75.4 A 4.1 4.1 0 0 1 32.6 78.0 A 5.4 5.4 0 0 1 24.0 79.1 A 5.3 5.3 0 0 1 15.5 78.0 A 4.4 4.4 0 0 1 8.8 75.6 A 2.2 2.2 0 0 1 9.2 72.0 A 2.1 2.1 0 0 1 10.0 68.7 A 3.7 3.7 0 0 1 15.2 65.8 A 5.5 5.5 0 0 1 24.0 65.2 A 5.4 5.4 0 0 1 32.7 65.9 A 3.3 3.3 0 0 1 37.0 68.9 A 2.9 2.9 0 0 1 40.6 72.0 Z" />
          <path d="M 90.2 58.0 A 2.8 2.8 0 0 1 87.8 61.8 A 4.7 4.7 0 0 1 80.6 64.1 A 5.3 5.3 0 0 1 72.0 64.8 A 4.9 4.9 0 0 1 64.2 63.6 A 4.8 4.8 0 0 1 56.6 61.7 A 2.5 2.5 0 0 1 54.8 58.0 A 2.5 2.5 0 0 1 56.3 54.3 A 4.7 4.7 0 0 1 63.6 52.0 A 5.3 5.3 0 0 1 72.0 50.5 A 5.2 5.2 0 0 1 80.3 52.1 A 4.9 4.9 0 0 1 87.8 54.2 A 2.8 2.8 0 0 1 90.2 58.0 Z" />
          <path d="M 66.6 40.0 A 2.5 2.5 0 0 1 63.9 43.1 A 3.3 3.3 0 0 1 59.7 46.1 A 5.8 5.8 0 0 1 50.4 46.8 A 5.7 5.7 0 0 1 41.2 47.5 A 5.2 5.2 0 0 1 33.0 45.8 A 3.4 3.4 0 0 1 28.4 43.0 A 3.0 3.0 0 0 1 24.7 40.0 A 3.0 3.0 0 0 1 28.5 37.0 A 3.3 3.3 0 0 1 32.9 34.1 A 5.5 5.5 0 0 1 41.6 33.2 A 5.4 5.4 0 0 1 50.4 33.1 A 5.4 5.4 0 0 1 59.1 34.1 A 4.7 4.7 0 0 1 66.4 36.5 A 2.2 2.2 0 0 1 66.6 40.0 Z" />
        </g>
        <g class="tree-bark">
          <path class="trunk-line" stroke-width="3.5" d="M 49 156 C 47 140 55 128 50 112 C 45 98 53 90 48 74 C 46 64 48 56 47 48" />
          <path class="trunk-line" stroke-width="2"   d="M 50 104 C 42 96 33 90 24 82" />
          <path class="trunk-line" stroke-width="2"   d="M 50 88 C 58 80 66 74 73 66" />
          <path class="trunk-line" stroke-width="1.4" d="M 48 60 C 42 54 38 50 34 45" />
        </g>
      </g>

      <!-- EUCALIPTO: copa alta con fleco colgante -->
      <g class="tree-variant" data-variant="eucalyptus">
        <g class="tree-canopy">
          <path d="M 90.3 40.0 A 5.0 5.0 0 0 1 87.2 47.5 A 6.3 6.3 0 0 1 79.0 53.4 A 6.4 6.4 0 0 1 71.7 60.7 A 9.5 9.5 0 0 1 56.4 60.0 A 8.4 8.4 0 0 1 42.9 62.0 A 9.2 9.2 0 0 1 28.2 60.8 A 6.3 6.3 0 0 1 21.3 53.2 A 7.0 7.0 0 0 1 11.5 47.7 A 5.1 5.1 0 0 1 8.5 40.0 A 6.0 6.0 0 0 1 15.1 33.0 A 5.2 5.2 0 0 1 19.6 26.0 A 6.9 6.9 0 0 1 28.9 19.9 A 8.8 8.8 0 0 1 43.0 18.2 A 8.9 8.9 0 0 1 57.3 17.1 A 7.8 7.8 0 0 1 69.0 21.9 A 7.1 7.1 0 0 1 79.6 26.4 A 5.4 5.4 0 0 1 85.4 32.9 A 5.4 5.4 0 0 1 90.3 40.0 Z" />
          <path d="M 30.4 60.0 A 3.4 3.4 0 0 1 28.3 65.0 A 3.7 3.7 0 0 1 23.7 68.9 A 4.2 4.2 0 0 1 17.0 69.6 A 4.3 4.3 0 0 1 10.0 69.3 A 4.0 4.0 0 0 1 4.9 65.4 A 3.5 3.5 0 0 1 3.4 60.0 A 3.4 3.4 0 0 1 6.3 55.2 A 3.6 3.6 0 0 1 10.4 51.2 A 4.2 4.2 0 0 1 17.0 50.2 A 4.0 4.0 0 0 1 23.3 51.6 A 4.2 4.2 0 0 1 29.4 54.5 A 3.5 3.5 0 0 1 30.4 60.0 Z" />
          <path d="M 96.1 58.0 A 3.3 3.3 0 0 1 94.6 63.1 A 3.9 3.9 0 0 1 90.1 67.5 A 4.4 4.4 0 0 1 83.0 68.1 A 4.2 4.2 0 0 1 76.4 66.8 A 3.8 3.8 0 0 1 71.4 63.2 A 3.2 3.2 0 0 1 70.6 58.0 A 3.2 3.2 0 0 1 71.5 52.9 A 3.8 3.8 0 0 1 76.2 49.0 A 4.3 4.3 0 0 1 83.0 47.3 A 4.1 4.1 0 0 1 89.1 49.9 A 3.6 3.6 0 0 1 94.0 53.1 A 3.3 3.3 0 0 1 96.1 58.0 Z" />
        </g>
        <!-- Fleco colgante -->
        <g class="tree-droop">
          <path d="M 14 68 C 13 74 12.5 79 13.5 85" />
          <path d="M 26 64 C 25 71 24.5 77 25.5 84" />
          <path d="M 38 63 C 37 70 36.5 77 37.5 85" />
          <path d="M 62 62 C 61 69 60.5 76 61.5 84" />
          <path d="M 74 64 C 73 70 72.5 76 73.5 83" />
          <path d="M 87 66 C 86 72 85.5 77 86.5 83" />
        </g>
        <g class="tree-bark">
          <path class="trunk-line" stroke-width="3.2" d="M 50 156 C 49 132 51 116 50 100" />
          <path class="trunk-line" stroke-width="2"   d="M 50 102 C 42 88 36 78 30 66" />
          <path class="trunk-line" stroke-width="2"   d="M 50 102 C 58 88 64 78 70 64" />
          <path class="trunk-line" stroke-width="1.4" d="M 50 110 C 46 100 42 94 38 88" />
        </g>
      </g>

      <!-- Pasto: mechones de neón verde a lo largo del piso -->
      <g class="tree-grass">
        <path d="M 71 155.5 C 70.5 153, 70 151, 69 149.5 M 72 155.5 C 72 152.5, 72.2 150.5, 72.5 148.5 M 73.2 155.5 C 73.8 153, 74.4 151.3, 75.3 150" />
      </g>
    </svg>

    <!-- Cofre del tesoro neón, entreabierto y con luz saliendo.
         Arrastra una hoja aquí para guardarla (borrarla): la tapa se abre,
         la hoja cae adentro y salen chispas doradas. -->
    <div id="treasure" aria-label="Cofre: suelta una hoja aquí para borrarla">
      <svg viewBox="0 0 24 26" aria-hidden="true">
        <!-- Cuerpo del cofre -->
        <path class="chest-body" d="M 3 12 H 21 V 20.4 A 1.6 1.6 0 0 1 19.4 22 H 4.6 A 1.6 1.6 0 0 1 3 20.4 Z" />
        <path class="chest-band" d="M 7.5 12 V 22 M 16.5 12 V 22 M 3 16.5 H 21" />
        <!-- Luz del tesoro escapando por la rendija -->
        <ellipse class="chest-light" cx="13" cy="11.8" rx="8.2" ry="1.7" />
        <!-- Monedas y joyas asomándose -->
        <g class="loot">
          <circle class="coin" cx="7.6"  cy="11.2" r="1.35" />
          <circle class="coin" cx="10.4" cy="10.7" r="1.45" />
          <circle class="coin" cx="16.4" cy="11.1" r="1.35" />
          <path class="gem gem-red"   d="M 13 9.2 L 14.7 10.5 L 13.9 12.2 L 12.1 12.2 L 11.3 10.5 Z" />
          <path class="gem gem-green" d="M 18.7 9.8 L 19.9 10.9 L 19.3 12.2 L 18 12.2 L 17.5 10.9 Z" />
        </g>
        <!-- Tapa abovedada, entreabierta (gira sobre la bisagra izquierda) -->
        <g class="lid-g">
          <path class="chest-lid" d="M 3 12 A 9 7 0 0 1 21 12 Z" />
          <path class="chest-band" d="M 7.5 6.6 V 12 M 16.5 6.6 V 12" />
        </g>
        <!-- Cerradura con ojo de llave -->
        <rect class="chest-lock" x="10.2" y="13" width="3.6" height="5" rx="0.8" />
        <circle class="chest-keyhole" cx="12" cy="14.8" r="0.75" />
        <path class="chest-keyhole" d="M 11.6 15.2 L 12.4 15.2 L 12.6 16.8 L 11.4 16.8 Z" />
        <!-- Chispas doradas (estallido inmenso al guardar una hoja) -->
        <g class="sparks">
          <circle class="spark" cx="12" cy="10" r="1.4" style="--dx:-14px;--dy:-18px" />
          <circle class="spark" cx="12" cy="10" r="1.1" style="--dx:0px;--dy:-24px" />
          <circle class="spark" cx="12" cy="10" r="1.4" style="--dx:14px;--dy:-18px" />
          <circle class="spark" cx="12" cy="10" r="1.0" style="--dx:-22px;--dy:-8px" />
          <circle class="spark" cx="12" cy="10" r="1.0" style="--dx:22px;--dy:-8px" />
          <circle class="spark" cx="12" cy="10" r="1.2" style="--dx:6px;--dy:-26px" />
          <circle class="spark" cx="12" cy="10" r="1.2" style="--dx:-6px;--dy:-26px" />
          <circle class="spark" cx="12" cy="10" r="0.9" style="--dx:-18px;--dy:-14px" />
          <circle class="spark" cx="12" cy="10" r="0.9" style="--dx:18px;--dy:-14px" />
          <circle class="spark" cx="12" cy="10" r="0.8" style="--dx:0px;--dy:-15px" />
        </g>
      </svg>
    </div>

    <!-- Etiquetas de las zonas (texto arcade discreto) -->
    <div id="zone-labels" aria-hidden="true"></div>

    <!-- Capa de hojas del escritorio activo. Solo esta capa hace fade al
         cambiar de escritorio; el árbol y el cofre quedan fijos. -->
    <div id="leaf-layer"></div>

  </main>

  <!-- Indicador de escritorios (puntos, arriba centro) -->
  <nav id="ws-dots" aria-label="Escritorios"></nav>

  <!-- Botón para crear un escritorio nuevo (gris, arriba derecha) -->
  <button id="new-ws-btn" type="button" aria-label="Nuevo escritorio">+</button>

  <!-- Botón flotante para crear hojas nuevas -->
  <button id="add-btn" type="button" aria-label="Crear nueva hoja">+</button>

  <script src="config.js?v=33"></script>
  <script src="script.js?v=33"></script>
</body>
</html>
